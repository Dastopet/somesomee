<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kejutan</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    text-align:center;
    overflow:hidden;
}

#halaman1{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:#f0f8ff;
}

#halaman2{
    display:none;
    height:100vh;
    background:linear-gradient(to bottom,#ffd6e7,#fff);
    position:relative;
}

button{
    padding:15px 30px;
    font-size:20px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.konfeti{
    position:absolute;
    font-size:25px;
    animation:jatuh 3s linear forwards;
}

@keyframes jatuh{
    from{
        transform:translateY(-100px);
    }
    to{
        transform:translateY(110vh);
    }
}

.bunga{
    position:absolute;
    font-size:40px;
    animation:melayang 4s infinite alternate;
}

@keyframes melayang{
    from{transform:translateY(0);}
    to{transform:translateY(-20px);}
}
</style>
</head>
<body>

<div id="halaman1">
    <h1>🎁 Ada sesuatu untukmu 🎁</h1>
    <button onclick="mulaiKejutan()">Klik Di Sini</button>
</div>

<div id="halaman2">
    <h1 style="padding-top:100px;">
        🌸 Untuk Nama Temanmu 🌸
    </h1>

    <h2>Kapan Bayar Hutang Sat !!! 😊</h2>

    <div class="bunga" style="left:10%;top:30%">🌹</div>
    <div class="bunga" style="left:25%;top:60%">🌸</div>
    <div class="bunga" style="left:40%;top:40%">🌷</div>
    <div class="bunga" style="left:60%;top:65%">🌺</div>
    <div class="bunga" style="left:75%;top:35%">🌻</div>
    <div class="bunga" style="left:90%;top:55%">🌼</div>
</div>

<script>

function mulaiKejutan(){

    for(let i=0;i<100;i++){

        let konfeti=document.createElement("div");
        konfeti.className="konfeti";
        konfeti.innerHTML=["🎉","✨","🎊"][Math.floor(Math.random()*3)];

        konfeti.style.left=Math.random()*100+"vw";
        konfeti.style.animationDuration=
        (Math.random()*3+2)+"s";

        document.body.appendChild(konfeti);

        setTimeout(()=>{
            konfeti.remove();
        },5000);
    }

    setTimeout(()=>{
        document.getElementById("halaman1").style.display="none";
        document.getElementById("halaman2").style.display="block";
    },3000);
}
</script>

</body>
</html>
